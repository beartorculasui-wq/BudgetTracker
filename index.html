<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💸 Budget Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2196F3">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2196F3">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #81D4FA;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 1rem 0;
        }

        .app-wrapper {
            width: 92%;
            max-width: 420px;
            background: #FFFFFF;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 4px solid #2196F3;
        }

        .app-logo {
            width: 70px;
            height: 70px;
            margin-bottom: 0.8rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            color: #1a1a1a;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #2196F3;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder {
            color: #888;
        }

        .type-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .type-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid #2196F3;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        .type-btn.active {
            background: #2196F3;
            color: #FFFFFF;
        }

        .type-btn:not(.active) {
            background: #FFFFFF;
            color: #1a1a1a;
        }

        .add-btn {
            width: 100%;
            padding: 1.1rem;
            border: none;
            border-radius: 8px;
            background: #2196F3;
            color: #FFFFFF;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1.2rem;
        }

        .balance {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <img src="icon-192.png" alt="Budget Tracker Icon" class="app-logo">
        <h1>Budget Tracker</h1>
        
        <input type="text" placeholder="Description" id="desc">
        <input type="number" placeholder="Amount" id="amount" min="0">
        
        <div class="type-toggle">
            <button class="type-btn active" data-type="expense">Expense</button>
            <button class="type-btn" data-type="income">Income</button>
        </div>
        
        <button class="add-btn" onclick="addTransaction()">Add</button>
        
        <div class="balance">Balance: ₱<span id="balance">0.00</span></div>
    </div>

    <script>
        let balance = 0;
        const typeBtns = document.querySelectorAll('.type-btn');
        const balanceEl = document.getElementById('balance');

        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                typeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        function addTransaction() {
            const desc = document.getElementById('desc').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!desc || isNaN(amount) || amount <= 0) return;
            
            const type = document.querySelector('.type-btn.active').dataset.type;
            balance = type === 'expense' ? balance - amount : balance + amount;
            
            balanceEl.textContent = balance.toFixed(2);
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            localStorage.setItem('budgetBalance', balance);
        }

        window.onload = () => {
            const saved = localStorage.getItem('budgetBalance');
            if (saved) balance = parseFloat(saved);
            balanceEl.textContent = balance.toFixed(2);
        };

        // Service Worker Registration
        if('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.error('Service Worker error:', err));
            });
        }
    </script>
</body>
</html>
