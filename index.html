<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker </title></title>
<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

body{
font-family: Arial;
background:#ffd6e7; 
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:#ffc0cb; 
padding:20px;
border-radius:10px;
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #66bb6a; 
border-radius:5px;
}

button{
background:#4CAF50; 
color:white;
font-weight:bold;
border:none;
}

button:hover{
background:#388e3c;
}

.item{
display:flex;
justify-content:space-between;
background:#ffe6ef; /* 
padding:8px;
margin-top:6px;
border-radius:5px;
align-items:center;
}

.income{
color:#2ecc71; 
font-weight:bold;
}

.expense{
color:#ff5c8a; 
font-weight:bold;
}

.item button{
background:#ff4d88; 
color:white;
border:none;
padding:4px 8px;
border-radius:4px;
cursor:pointer;
}

.item button:hover{
background:#e84393;
}

h3{
background:#e8fff1;
padding:10px;
border-radius:6px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>Budget Tracker</h2>

<input id="desc" placeholder="Description">

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<button onclick="addTransaction()">Add</button>

<h3>Balance: ₱<span id="balance">0</span></h3>

<div id="history"></div>

</div>

<script>

let transactions = JSON.parse(localStorage.getItem("data")) || [];

function save(){
localStorage.setItem("data",JSON.stringify(transactions));
}

function addTransaction(){

let desc = document.getElementById("desc").value;
let amount = document.getElementById("amount").value;
let type = document.getElementById("type").value;

if(desc=="" || amount==""){
alert("Fill all fields");
return;
}

let transaction={
id:Date.now(),
desc:desc,
amount:Number(amount),
type:type
};

transactions.push(transaction);

save();
showData();

document.getElementById("desc").value="";
document.getElementById("amount").value="";

}

function deleteTransaction(id){

transactions = transactions.filter(t => t.id != id);

save();
showData();

}

function showData(){

let history = document.getElementById("history");
let balance = 0;

history.innerHTML="";

transactions.forEach(t=>{

if(t.type=="income"){
balance += t.amount;
}else{
balance -= t.amount;
}

let sign = t.type=="income" ? "+" : "-";
let color = t.type=="income" ? "income" : "expense";

let div = document.createElement("div");
div.className="item";

div.innerHTML = `
<span>${t.desc}</span>
<span class="${color}">${sign}${t.amount}</span>
<button onclick="deleteTransaction(${t.id})">X</button>
`;

history.appendChild(div);

});

document.getElementById("balance").innerText = balance;

}

showData();



if ("serviceWorker" in navigator) {
navigator.serviceWorker
.register("/service-worker.js")
.then(() => {
console.log("ok gd");
})
.catch((error) => {
console.log("Registration failed: ", error);
});
}

 

</script>

</body>
</html>
