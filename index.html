<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker </title></title>
<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><body class="bg-secondary-subtle">
<div class="container py-5">
<div class="card shadow-sm mx-auto" style="max-width: 400px;">
<div class="card-body text-center">
<img src="icon-512.png" class="img-fluid rounded-circle w-25 h-25 " alt="Responsive image">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #d8d8d8; /* Light grey background */
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .outer-container {
      background: #fcb7ca; /* Pink outer container */
      padding: 30px 20px;
      border-radius: 15px;
      box-sizing: border-box;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
    }

    .container {
      background: white;
      max-width: 320px;
      padding: 25px 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
    }

    .container img {
      width: 48px;
      margin-bottom: 15px;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 20px;
      color: black;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      margin: 8px 0;
      border: 2px solid #4caf50;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
      background: #fff;
      color: #333;
    }

    select {
      appearance: none;
      background-color: #ededed;
      border: 2px solid black;
      font-weight: 600;
    }

    button {
      background-color: #4caf50; /* Green button */
      color: white;
      font-weight: 600;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      padding: 10px 0;
      cursor: pointer;
      margin-top: 12px;
      width: 100%;
    }

    button:hover {
      background-color: #388e3c;
    }

    h3 {
      margin-top: 15px;
      font-weight: 600;
      font-size: 18px;
      color: black;
    }
  </style>
</head>

<body>
  <div class="outer-container">
    <div class="container">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="budget icon" />
      <h2>Budget Tracker</h2>

      <input id="desc" placeholder="Description" />
      <input id="amount" type="number" placeholder="Amount" />
      <select id="type">
        <option value="expense" selected>Expense</option>
        <option value="income">Income</option>
      </select>

      <button onclick="addTransaction()">Add</button>

      <h3>Balance: ₱<span id="balance">0</span></h3>

      <div id="history"></div>
    </div>
  </div>

  <script>
    let transactions = JSON.parse(localStorage.getItem("data")) || [];

    function save() {
      localStorage.setItem("data", JSON.stringify(transactions));
    }

    function addTransaction() {
      let desc = document.getElementById("desc").value;
      let amount = document.getElementById("amount").value;
      let type = document.getElementById("type").value;

      if (desc == "" || amount == "") {
        alert("Fill all fields");
        return;
      }

      let transaction = {
        id: Date.now(),
        desc: desc,
        amount: Number(amount),
        type: type,
      };

      transactions.push(transaction);

      save();
      showData();

      document.getElementById("desc").value = "";
      document.getElementById("amount").value = "";
    }

    function deleteTransaction(id) {
      transactions = transactions.filter((t) => t.id != id);

      save();
      showData();
    }

    function showData() {
      let history = document.getElementById("history");
      let balance = 0;

      history.innerHTML = "";

      transactions.forEach((t) => {
        if (t.type == "income") {
          balance += t.amount;
        } else {
          balance -= t.amount;
        }

        let sign = t.type == "income" ? "+" : "-";
        let color = t.type == "income" ? "income" : "expense";

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
        <span>${t.desc}</span>
        <span class="${color}">${sign}${t.amount}</span>
        <button onclick="deleteTransaction(${t.id})">X</button>
        `;

        history.appendChild(div);
      });

      document.getElementById("balance").innerText = balance;
    }

    showData();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/service-worker.js")
        .then(() => {
          console.log("ayos! rehistro as service worker");
        })
        .catch((error) => {
          console.log("Registration failed: ", error);
        });
    }
  </script>
</body>

</html>
