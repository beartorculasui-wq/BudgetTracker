<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">

    <title>Budget Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #053173; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: rgb(64, 191, 196); padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #0b0482; border-radius: 5px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; background-color: #3498db; color: rgb(53, 19, 186); border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        
        .transaction-list { margin-top: 30px; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fafafa; margin-bottom: 8px; border-radius: 5px; }
        .t-info { display: flex; flex-direction: column; }
        .t-desc { font-weight: bold; color: #333; }
        .t-amount { font-size: 1.1em; }
        .income { color: #20068a; }
        .expense { color: #226f7c; }
        
        .delete-btn { background-color: #2e36c9; width: auto; padding: 5px 10px; font-size: 12px; margin-left: 10px; }
        .delete-btn:hover { background-color: #2c35ac; }
        
        .total-box { text-align: center; margin-top: 20px; padding: 15px; background: #74aedb; border-radius: 5px; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Budget Tracker</h1>
    
    <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g.  Allowance,Salary, Food">
    </div>
    <div class="form-group">
        <label>Amount</label>
        <input type="number" id="amount" placeholder="0.00">
    </div>
    <div class="form-group">
        <label>Type</label>
        <select id="type">
            <option value="income">Income (+)</option>
            <option value="expense">Expense (-)</option>
        </select>
    </div>
    <button onclick="app.addTransaction()">Add Transaction</button>

    <div class="transaction-list" id="list">
    </div>

    <div class="total-box">
        Balance: <span id="balance">0.00</span>
    </div>
</div>

<script>
    class StorageService {
        constructor() {
            this.storageKey = 'budget_tracker_data';
        }

        getData() {
            const data = localStorage.getItem(this.storageKey);
            return data ? JSON.parse(data) : [];
        }

        saveData(data) {
            localStorage.setItem(this.storageKey, JSON.stringify(data));
        }

        async createTransaction(transaction) {
            if (!transaction.amount || !transaction.description) {
                throw new Error("Amount and Description are required");
            }

            const data = this.getData();
            const newTransaction = {
                id: Date.now().toString(),
                description: transaction.description,
                amount: parseFloat(transaction.amount),
                type: transaction.type,
                date: new Date().toLocaleDateString()
            };

            data.push(newTransaction);
            this.saveData(data);
            return newTransaction;
        }

        async getTransactions() {
            return this.getData();
        }

        async deleteTransaction(id) {
            let data = this.getData();
            data = data.filter(t => t.id !== id);
            this.saveData(data);
        }

        async updateTransaction(id, updates) {
            let data = this.getData();
            const index = data.findIndex(t => t.id === id);
            if (index !== -1) {
                data[index] = { ...data[index], ...updates };
                this.saveData(data);
            }
        }
    }

    const app = {
        service: new StorageService(),

        async init() {
            await this.loadTransactions();
        },

        async addTransaction() {
            const descInput = document.getElementById('desc');
            const amountInput = document.getElementById('amount');
            const typeInput = document.getElementById('type');

            const transaction = {
                description: descInput.value,
                amount: amountInput.value,
                type: typeInput.value
            };

            try {
                await this.service.createTransaction(transaction);
                
                descInput.value = '';
                amountInput.value = '';
                
                await this.loadTransactions();
            } catch (error) {
                alert(error.message);
            }
        },

        async loadTransactions() {
            const list = document.getElementById('list');
            const balanceEl = document.getElementById('balance');
            
            const transactions = await this.service.getTransactions();
            
            list.innerHTML = '';
            let balance = 0;

            transactions.forEach(t => {
                if (t.type === 'income') balance += t.amount;
                else balance -= t.amount;

                const item = document.createElement('div');
                item.className = 'transaction-item';
                
                const sign = t.type === 'income' ? '+' : '-';
                const colorClass = t.type === 'income' ? 'income' : 'expense';

                item.innerHTML = `
                    <div class="t-info">
                        <span class="t-desc">${t.description}</span>
                        <small>${t.date}</small>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="t-amount ${colorClass}">${sign}${t.amount.toFixed(2)}</span>
                        <button class="delete-btn" onclick="app.deleteTransaction('${t.id}')">X</button>
                    </div>
                `;
                list.appendChild(item);
            });

            balanceEl.innerText = balance.toFixed(2);
            balanceEl.style.color = balance >= 0 ? '#27ae60' : '#c0392b';
        },

        async deleteTransaction(id) {
            if(confirm("Delete this transaction?")) {
                await this.service.deleteTransaction(id);
                await this.loadTransactions();
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        app.init();
    });
</script>

</body>

</html>
